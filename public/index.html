<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Bot Resi Offline</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📦</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f1419; --panel: #171c25; --border: #2a313d; --text: #e6edf3; --accent: #ffb454; --ok: #7fd962; --err: #ff6b6b; --warn: #ffd866;}
        * { box-sizing: border-box; font-family: 'Space Grotesk', sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; margin-bottom: 20px; }
        .card { background: var(--panel); border: 1px solid var(--border); padding: 20px; border-radius: 8px; text-align: center; }
        .card h3 { margin: 0; color: #8b949e; font-size: 14px; }
        .card p { margin: 10px 0 0; font-size: 28px; font-weight: bold; color: var(--accent); }
        .main-area { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .box { background: var(--panel); border: 1px solid var(--border); padding: 20px; border-radius: 8px; }
        
        .progress-bg { width: 100%; background: var(--border); border-radius: 5px; margin-bottom: 15px; overflow: hidden; display: none; }
        .progress-bar { height: 10px; background: var(--accent); width: 0%; transition: width 0.3s; }
        
        .log-box { height: 400px; overflow-y: auto; background: #0a0e13; padding: 10px; border-radius: 6px; font-size: 13px; border: 1px solid var(--border); }
        .info { color: #5ccfe6; } .success { color: var(--ok); } .warn { color: var(--warn); } .error { color: var(--err); }
        
        input, select, button { padding: 10px; border-radius: 5px; border: 1px solid var(--border); background: var(--bg); color: var(--text); width: 100%; margin-bottom: 10px; }
        button { font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { filter: brightness(1.1); }
        .btn-primary { background: var(--accent); color: #000; }
        .btn-danger { background: var(--err); color: #000; }
        .btn-warn { background: var(--warn); color: #000; }
        .btn-success { background: var(--ok); color: #000; }
        
        /* Modifikasi Setup Box menjadi Collapsible yang elegan */
        details.setup-box { border: 2px dashed var(--accent); padding: 15px; margin-bottom: 15px; border-radius: 8px; background: #1a1f29; transition: all 0.3s ease;}
        details.setup-box summary { cursor: pointer; font-weight: bold; font-size: 16px; color: var(--accent); outline: none; user-select: none; }
        details.setup-box summary:hover { opacity: 0.8; }
        
        .disabled-area { opacity: 0.5; pointer-events: none; }
        
        .failed-item { display: flex; gap: 10px; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid var(--border); }
        .failed-item img { width: 80px; height: 80px; object-fit: cover; border-radius: 5px; }
        .btn-group { display: flex; gap: 5px; margin-top: 5px; }

        .active-badge { display: none; background: rgba(127, 217, 98, 0.1); border: 1px solid var(--ok); color: var(--ok); padding: 10px; border-radius: 5px; margin-bottom: 15px; font-weight: bold; text-align: center; }
    </style>
</head>
<body>
    <h1>📦 J&T Resi Bot - Advanced Offline</h1>
    
    <div class="grid">
        <div class="card"><h3>Antrean Queue</h3><p id="st-queue">0</p></div>
        <div class="card"><h3>Sedang Diproses</h3><p id="st-active" class="info">0</p></div>
        <div class="card"><h3>Total Sukses</h3><p id="st-success" class="success">0</p></div>
        <div class="card"><h3>Gagal / Manual</h3><p id="st-failed" class="error">0</p></div>
        <div class="card"><h3>Total Foto Di Proses</h3><p id="st-lifetime" style="color: #5ccfe6;">0</p></div>
    </div>

    <div class="main-area">
        <div class="box">
            
            <details class="setup-box" id="setupBox" open>
                <summary>⚙️ Panel Kontrol Mesin OCR (Klik untuk Buka/Tutup)</summary>
                
                <div style="margin-top: 15px;">
                    <div id="activeEngineInfo" class="active-badge"></div>

                    <label>Ganti Mesin OCR:</label>
                    <select id="engineSelect" onchange="toggleConcurrent()">
                        <option value="" disabled selected>-- Pilih OCR Engine --</option>
                        <option value="1">Engine 1 (Tesseract Offline - Cepat)</option>
                        <option value="2">Engine 2 (OCR.space Online - Akurasi Tinggi)</option>
                        <option value="3">Engine 3 (Lensa Mikro - Teks Ekstra Kecil)</option>
                    </select>

                    <label style="margin-top:10px; display:block;">Kecepatan Proses:</label>
                    <select id="concurrentSelect">
                        <option value="" disabled selected>-- Pilih Kecepatan --</option>
                        <option value="1">1 Foto (Wajib untuk Engine 2 / Sangat Ringan)</option>
                        <option value="3">3 Foto (Aman untuk Laptop Standar)</option>
                        <option value="5">5 Foto (Cepat - Rekomendasi)</option>
                        <option value="10">10 Foto (Tinggi - Butuh RAM Besar)</option>
                        <option value="15">15 Foto (Sangat Berat - Hanya PC High-End)</option>
                        <option value="20">20 Foto (Ekstrem - Awas PC Hang/Crash!)</option>
                    </select>
                    
                    <button class="btn-primary" onclick="updateSetup()" style="margin-top: 10px;">Simpan & Terapkan Pengaturan</button>
                </div>
            </details>

            <div id="uploadArea" class="disabled-area">
                <input type="file" id="fileInput" multiple accept="image/*">
                <button class="btn-primary" onclick="uploadFiles()">Unggah Foto Manual (Jika tidak pakai Drop Folder)</button>
                
                <div class="progress-bg" id="progressBg">
                    <div class="progress-bar" id="progressBar"></div>
                </div>

                <div class="btn-group">
                    <button class="btn-danger" onclick="apiAction('/api/cancel-queue')">Batalkan Antrean</button>
                    <button class="btn-warn" onclick="apiAction('/api/clear-memory')">Hapus Ingatan File</button>
                    <button class="btn-danger" onclick="apiAction('/api/reset-stats')">Reset Statistik</button>
                </div>
                
                <button class="btn-success" onclick="exportExcel()" style="margin-top: 10px;">Download Excel Manifest</button>
                <div id="downloadLinks" style="margin-top:10px; font-size:12px;"></div>
            </div>

            <h3 style="margin-top: 20px;">Tinjauan Manual (Gagal)</h3>
            <div id="failedList" style="max-height: 450px; overflow-y: auto; padding-right: 5px;"></div>
        </div>

        <div class="box">
            <h2>Activity Log</h2>
            <div class="log-box" id="logBox"></div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const logBox = document.getElementById('logBox');
        let totalQueue = 0;

        function toggleConcurrent() {
            const engine = document.getElementById('engineSelect').value;
            const concurrent = document.getElementById('concurrentSelect');
            if (engine === '2') {
                concurrent.value = '1';
                concurrent.disabled = true;
            } else {
                concurrent.disabled = false;
            }
        }

        function updateSetup() {
            const engine = document.getElementById('engineSelect').value;
            const max = document.getElementById('concurrentSelect').value;
            
            if(!engine) return alert('Pilih Mesin OCR terlebih dahulu!');
            if(!max && engine === '1') return alert('Pilih jumlah kecepatan proses!');
            
            const finalMax = engine === '2' ? 1 : parseInt(max);

            fetch('/api/set-setup', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ max: finalMax, engine: parseInt(engine) })
            }).then(() => {
                const infoBadge = document.getElementById('activeEngineInfo');
                infoBadge.style.display = 'block';
                
                let engineName = '';
                if (engine === '1') engineName = 'Engine 1 (Tesseract Offline)';
                else if (engine === '2') engineName = 'Engine 2 (OCR.space Online)';
                else if (engine === '3') engineName = 'Engine 3 (Lensa Mikro & No Skip)';
                
                infoBadge.innerHTML = `🟢 SEDANG AKTIF: <br> ${engineName} <br> Maksimal Proses: ${finalMax} Foto Bersamaan`;
                
                document.getElementById('uploadArea').classList.remove('disabled-area');
                document.getElementById('setupBox').removeAttribute('open');
                
                alert('Pengaturan Berhasil Diterapkan!');
            });
        }

        async function apiAction(endpoint) {
            const res = await fetch(endpoint, { method: 'POST' });
            const data = await res.json();
            alert(data.msg);
            if (endpoint === '/api/reset-stats') {
                document.getElementById('failedList').innerHTML = '';
            }
        }

        socket.on('log', data => {
            logBox.insertAdjacentHTML('beforeend', `<div class="${data.type}">[${new Date().toLocaleTimeString()}] ${data.msg}</div>`);
            logBox.scrollTop = logBox.scrollHeight;
        });

        socket.on('stats', s => {
            document.getElementById('st-queue').innerText = s.queue;
            document.getElementById('st-active').innerText = s.active;
            document.getElementById('st-success').innerText = s.success;
            document.getElementById('st-failed').innerText = s.failed;
            document.getElementById('st-lifetime').innerText = s.lifetime;

            if (totalQueue > 0 && s.queue > 0) {
                document.getElementById('progressBg').style.display = 'block';
                let percent = ((totalQueue - s.queue) / totalQueue) * 100;
                document.getElementById('progressBar').style.width = percent + '%';
            } else if (s.queue === 0) {
                document.getElementById('progressBg').style.display = 'none';
                document.getElementById('progressBar').style.width = '0%';
                totalQueue = 0;
            }
        });

        socket.on('new_failed', data => {
            const list = document.getElementById('failedList');
            const id = 'fail_' + data.filename.replace(/[^a-zA-Z0-9]/g, '');
            if(document.getElementById(id)) return; 

            // Simpan HTML ke dalam variabel string
            const htmlString = `
                <div class="failed-item" id="${id}">
                    <a href="/gagal/${data.filename}" target="_blank"><img src="/gagal/${data.filename}"></a>
                    <div style="flex:1;">
                        <span style="font-size:12px; color:gray;">${data.filename}</span>
                        <input type="text" id="input_${id}" placeholder="Ketik Resi (Koma jika >1)">
                        <div class="btn-group">
                            <button class="btn-primary" onclick="submitManual('${data.filename}', '${id}')">Simpan</button>
                            <button class="btn-warn" onclick="retryFailed('${data.filename}', '${id}')">Retry OCR</button>
                            <button class="btn-danger" onclick="deleteFailed('${data.filename}', '${id}')">Hapus</button>
                        </div>
                    </div>
                </div>`;
            
            // Perbaikan: Gunakan insertAdjacentHTML
            // 'beforeend' akan memunculkan item baru di urutan paling bawah (Lama ke Baru).
            // Jika nanti kamu ingin item terbaru muncul di bagian atas, cukup ganti kata 'beforeend' menjadi 'afterbegin'.
            list.insertAdjacentHTML('beforeend', htmlString);
        });

        async function uploadFiles() {
            const files = document.getElementById('fileInput').files;
            if (files.length === 0) return alert('Pilih file dulu!');
            
            totalQueue += files.length;
            const formData = new FormData();
            for (let i = 0; i < files.length; i++) formData.append('photos', files[i]);
            
            await fetch('/api/upload', { method: 'POST', body: formData });
            document.getElementById('fileInput').value = '';
        }

        async function submitManual(filename, elementId) {
            const inputVal = document.getElementById(`input_${elementId}`).value;
            if (!inputVal) return alert('Resi kosong!');
            const res = await fetch('/api/override', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ filename, resiString: inputVal })
            });
            if (res.ok) document.getElementById(elementId).remove();
        }

        async function retryFailed(filename, elementId) {
            document.getElementById(elementId).remove();
            await fetch('/api/retry', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ filename })
            });
        }

        async function deleteFailed(filename, elementId) {
            if (!confirm(`Apakah kamu yakin ingin menghapus foto ${filename} dari daftar gagal?`)) {
                return;
            }

            try {
                const res = await fetch('/api/delete-failed', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ filenames: [filename] }) 
                });

                const data = await res.json();
                
                if (data.ok) {
                    document.getElementById(elementId).remove();
                } else {
                    alert('Error: ' + data.error);
                }
            } catch (error) {
                console.error("Gagal memanggil API penghapusan:", error);
                alert('Gagal menghubungi server.');
            }
        }

        async function exportExcel() {
            const res = await fetch('/api/export');
            if(!res.ok) return alert('Data kosong.');
            const data = await res.json();
            let html = '<div style="color:var(--ok);">File siap:</div>';
            data.files.forEach(f => html += `<div>- ${f}</div>`);
            document.getElementById('downloadLinks').innerHTML = html;
        }
    </script>
</body>
</html>
